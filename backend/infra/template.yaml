AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DekhoCampus parallel API. It is safe to deploy before enabling AWS traffic.

Parameters:
  SupabaseUrl:
    Type: String
  SupabasePublishableKey:
    Type: String
    NoEcho: true
  CorsOrigin:
    Type: String
    Default: https://www.dekhocampus.in

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 29
    MemorySize: 1024
    Environment:
      Variables:
        BACKEND_USE_SUPABASE: 'yes'
        BACKEND_USE_AWS: 'no'
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_PUBLISHABLE_KEY: !Ref SupabasePublishableKey
        CORS_ORIGIN: !Ref CorsOrigin

Resources:
  ParallelApi:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/
      Handler: lambda.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET
        Status:
          Type: HttpApi
          Properties:
            Path: /v1/status
            Method: GET
        Functions:
          Type: HttpApi
          Properties:
            Path: /v1/functions/{proxy+}
            Method: ANY
        RestProxy:
          Type: HttpApi
          Properties:
            Path: /v1/rest/{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: Set this value as VITE_AWS_API_URL only after health and shadow checks pass.
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
